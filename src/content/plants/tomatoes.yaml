notes: "Summer annuals that are finished for the year. In at least 2 raised corrugated beds (one shared with basil, another separate). Pull out all dead/dying plants, remove any stakes or ties, and clear the beds completely. Work in fresh compost and aged manure before replanting in October-November. Don't compost diseased tomato foliage — bin it to avoid carrying over fungal problems."
