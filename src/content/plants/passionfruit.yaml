name: Passionfruit
type: climber
location: Backyard
health: "Growing through the star jasmine on the back fence — hard to distinguish the two from a distance but the vine appears to have decent foliage. Competing for space with vigorous jasmine. A closer look at the leaves and any fruit would help assess properly."
healthStatus: good
lastAssessed: "2026-04"
image: /images/plants/IMG_0979.jpg
photoNeeded: "Close-up of the passionfruit leaves and stems where they're distinct from the jasmine — check for vigour and any fruit"
notes: "Growing on the back (north) fence, tangled in with the star jasmine. The two climbers are sharing the same fence which means they're competing. The passionfruit has larger, 3-lobed leaves vs the jasmine's small glossy ovals — visible in the upper portions of the fence coverage. The vine appears to be holding its own. Passionfruit are short-lived (5-7 years) and need heavy feeding. Should be producing fruit through autumn — check for any on the ground. Hard prune in late winter."
tasks:
  - months: [8, 9]
    task: Hard prune — cut back by a third
    category: prune
  - months: [9]
    task: Feed heavily with complete fertiliser
    category: feed
  - months: [12]
    task: Feed again mid-summer
    category: feed
  - months: [3]
    task: Feed again in autumn
    category: feed
  - months: [4]
    task: Mulch thickly around base
    category: mulch
  - months: [12, 1, 2]
    task: Deep water regularly in hot weather
    category: water
  - months: [2, 3, 4, 5]
    task: Harvest fruit as it drops or wrinkles
    category: harvest
