notes: "Flax lily (Dianella 'Clarity Blue'). Multiple plants through the front garden providing good structural contrast with the silvery cushion bush and blue chalk sticks. Hardy Australian native that handles Melbourne conditions well. Blue-purple flowers in spring followed by blue berries. One of the lowest-maintenance plants here."
