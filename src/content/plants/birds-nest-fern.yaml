name: Birds Nest Fern
type: fern
location: Front yard
health: "Good colour and size but brown margins on multiple fronds confirmed in close-up (IMG_0990). Some frond tips torn or damaged. Dead material accumulated in the centre of the rosette. Needs cleanup and possibly more shelter."
healthStatus: good
lastAssessed: "2026-04"
image: /images/plants/IMG_0990.jpg
notes: "Asplenium australasicum. Big outdoor specimen in the front yard. The close-up photo confirms brown frond edges — this is most likely wind damage or summer sun scorch. The centre of the rosette has accumulated dead frond bases and leaf litter that should be cleaned out to prevent rot. Remove the worst-damaged fronds at the base. If the browning keeps getting worse, the fern may need more afternoon shade — either from nearby plants or a temporary shade cloth over summer. Keep the soil consistently moist but not waterlogged."
tasks:
  - months: [9, 12]
    task: Feed with liquid fertiliser (half strength)
    category: feed
  - months: [9]
    task: Remove old/damaged outer fronds
    category: prune
  - months: [4]
    task: Mulch around base to retain moisture
    category: mulch
  - months: [12, 1, 2]
    task: Keep moist — water if soil dries out
    category: water
