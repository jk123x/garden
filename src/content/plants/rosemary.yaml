notes: "Rosmarinus officinalis. Big established bush along the back fence near the star jasmine. Dense, upright, and full with no bare patches or dieback. Thrives on the full sun and free-draining position. Basically bulletproof in Melbourne. Prune for shape and harvest after flowering in spring."
