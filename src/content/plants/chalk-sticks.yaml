notes: "Senecio serpens 'Dwarf Blue'. Low-growing succulent patches through the front garden alongside the dianella and dichondra. The blue-grey colour is vibrant which means they're getting enough light. Sparse patches at the base could fill in — succulents dropped into gaps will root easily. Very drought-tolerant, practically indestructible. Avoid overwatering in winter."
