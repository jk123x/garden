notes: "Front yard lemon tree. The photo is taken from a distance which makes detailed assessment difficult. The canopy being a bit open/sparse could indicate it needs heavier feeding (lemons are greedy), or it might just be the tree's natural form. Worth doing a close inspection of the leaves for: curled/tunneled leaves (citrus leaf miner), sticky residue or black sooty mould (scale insects), yellowing patterns (nutrient deficiency). Feed with citrus fertiliser in autumn and again in late winter. Confirmed producing lemons. Last fed April 15 2026 — had been 2 months since previous feed. Closer photos coming to check leaf condition for pests."
