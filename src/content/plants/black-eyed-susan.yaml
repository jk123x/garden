name: Black Eyed Susan
type: perennial
location: Backyard (raised bed)
health: "Still dominating its half of the original bed after the April 16 cleanup. Now has room to breathe — the Echinacea and Achillea have been transplanted out. Flowering strongly."
healthStatus: healthy
lastAssessed: "2026-04"
image: /images/plants/IMG_1017.jpg
notes: "Rudbeckia fulgida var. fulgida. Stayed in the original metal raised bed during the April 16 transplant — it's thriving where it is and doesn't need moving. Now that the Echinacea and divided Achillea have been removed, the bed is much clearer. Could add new companion plants in the gaps come spring (more salvias, catmint, Russian sage, sedum). For now, let everything settle."
tasks:
  - months: [6, 7]
    task: Cut back dead growth to ground level
    category: prune
  - months: [9]
    task: Feed with complete fertiliser as new growth appears
    category: feed
  - months: [9]
    task: Divide crowded clumps
    category: general
  - months: [12, 1, 2]
    task: Deadhead spent flowers to encourage more blooms
    category: general
