name: Feijoa
type: fruit
location: Front fence (one side)
health: "Foliage healthy but internal structure is very congested even after the big 3.5m to 2m cut. Lots of crossing and competing branches visible. Needs thinning through the centre."
healthStatus: healthy
lastAssessed: "2026-04"
image: /images/plants/IMG_0988.jpg
notes: "Pineapple guava (Acca sellowiana). Near the front fence. Just had a major height reduction from 3.5m to 2m. The new photos (0987-0989) show the post-cut structure clearly — it's dense and congested inside. Next step is thinning: remove crossing branches, anything growing inward, and competing leaders. Wait until late winter (August) to do this — the tree needs to recover from the height cut first. Then maintain at 150-160cm with light trimming twice a year (after fruiting in April + shaping in August)."
