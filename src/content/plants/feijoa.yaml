notes: "Pineapple guava (Acca sellowiana). Near the front fence. Just had a major height reduction from 3.5m to 2m — that's a big cut and the tree needs time to recover and push regrowth. Don't cut again until late winter (August), then take another 20-30cm with heading cuts and thin out the regrowth from the big cut. Goal is 150-160cm maintained with light trimming twice a year: after fruiting (April) and shaping (August). Going harder now would stress it too much after already losing 1.5m of height."
