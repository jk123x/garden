name: Mexican Sage
type: perennial
location: Backyard
health: "Thriving — prolific purple flower spikes, very vigorous growth. Getting quite sprawling and reaching over toward the path. Will need a hard cut-back once flowering finishes in May/June."
healthStatus: healthy
lastAssessed: "2026-04"
image: /images/plants/IMG_0915.jpg
notes: "Salvia leucantha (Mexican Bush Sage). Multiple plants producing masses of purple velvet flower spikes — easily the best performer in the garden right now. Growth is sprawling, reaching over the stone path area. Cut back hard (by half to two-thirds) after flowering finishes, usually around May-June. Regrows fast from the base in spring. The spent flower spikes turn brown and should be removed."
tasks:
  - months: [8]
    task: Hard prune — cut back by half to promote bushy new growth
    category: prune
  - months: [9]
    task: Feed with complete fertiliser
    category: feed
  - months: [10, 11, 12, 1, 2, 3]
    task: Deadhead spent flower spikes for repeat blooms
    category: general
