name: Echinacea Sombrero
type: perennial
location: Backyard (new composted bed)
health: "Transplanted April 16 to the newly composted bed. Clump is intact with multiple emerging flower buds and the original red bloom. In better drainage now — should really take off once it settles."
healthStatus: good
lastAssessed: "2026-04"
image: /images/plants/IMG_1018.jpg
notes: "Echinacea 'Sombrero Salsa Red'. Moved from the original metal raised bed (where overwatering killed the others) into the freshly composted bed that previously held tomatoes/basil. Water in deeply, mulch 3-5cm keeping it off the crown, then leave alone. No fertiliser for 2-3 weeks. Key rule: don't overwater over winter — that's what killed the previous plants. Normal rainfall should be enough. Check soil with finger test before watering."
tasks:
  - months: [8, 9]
    task: Check for new growth emerging from crown
    category: general
  - months: [9]
    task: Feed with complete fertiliser if new growth appears
    category: feed
  - months: [3]
    task: Cut back dead stems to ground level
    category: prune
  - months: [4]
    task: Mulch around crown to protect over winter
    category: mulch
  - months: [12, 1, 2]
    task: Deadhead spent flowers to encourage more blooms
    category: general
