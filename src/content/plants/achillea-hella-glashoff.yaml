notes: "Yarrow (Achillea 'Hella Glashoff'). Originally 2 plants, confirmed surviving in the raised bed — the distinctive ferny grey-green foliage is visible in photos. Being crowded by the dominant Rudbeckia. When the bed gets its cleanup, pull back the Rudbeckia to give the Achillea room. If the clumps are healthy enough, they can be divided and spread. Tough plant that can bounce back if given space and light."
