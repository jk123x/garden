notes: "Yarrow (Achillea 'Hella Glashoff'). Originally planted as 2 plants in the corrugated metal raised bed alongside Rudbeckia, Echinacea, and Salvia nemorosa. Yarrow is tough and drought-tolerant so it may have survived even if it's been crowded out — look for the distinctive ferny grey-green foliage low down. If alive, it can be divided and moved to a less competitive spot. If dead, not worth replanting in that bed while the Rudbeckia dominates."
