notes: "Ornamental sage (Salvia nemorosa 'Caradonna'). Originally planted as 2 plants in the corrugated metal raised bed alongside Rudbeckia, Echinacea, and Achillea. 'Caradonna' has distinctive dark purple-black stems and upright violet-purple flower spikes. It's a clumping perennial that dies back in winter and reshoots in spring. If it's alive, it'll be visible as a basal rosette of green leaves low down. Could easily have been cut back with the Echinacea, or overwhelmed by the Rudbeckia's spread."
