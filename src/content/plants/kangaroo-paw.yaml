name: Kangaroo Paw
type: perennial
location: Front yard, backyard
health: "Better than first thought — close-up photos show no ink spot pattern (no concentric rings on leaves). The brown material is mostly dead leaves accumulated in the centres of the clumps plus some natural leaf-tip ageing. Just needs clean-up, not fungicide."
healthStatus: healthy
lastAssessed: "2026-04"
image: /images/plants/IMG_1021.jpg
notes: "Multiple clumps across front and back. The close-up photos (IMG_1021, IMG_1022) ruled out ink spot disease — no concentric ring pattern visible. What looked concerning from a distance is actually just accumulated dead leaves in the middle of the clumps and normal leaf-tip browning on older foliage. Pull out the dead material from the centres to improve airflow, cut any spent flower stalks to the base. Still worth a routine inkspot check in late spring/summer when conditions favour the disease."
tasks:
  - months: [3, 4]
    task: Cut back old flowering stems and dead foliage
    category: prune
  - months: [9]
    task: Feed with native fertiliser (low phosphorus)
    category: feed
  - months: [9]
    task: Divide crowded clumps
    category: general
  - months: [11, 12, 1]
    task: Check for ink spot disease — remove affected leaves
    category: spray
