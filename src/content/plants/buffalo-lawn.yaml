image: /images/plants/IMG_0978.jpg
notes: "Roughly 5x5m patch in the backyard. The lawn is green which is positive, but the coverage is thin/patchy — you can see bare spots. Could benefit from aeration (September), a feed, and overseeding any bare patches. Buffalo recovers well from runners so it should fill in with some attention. Clear the autumn leaf drop regularly so the grass gets light."
