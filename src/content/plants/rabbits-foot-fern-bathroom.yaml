name: Rabbit's Foot Fern (Bathroom)
type: fern
indoor: true
location: Bathroom
health: "Healthy"
image: /images/plants/IMG_0929.jpg
notes: "Davallia. Fuzzy rhizomes creep over pot edges."
tasks:
  - months: [9, 10, 11, 12, 1, 2]
    task: Feed with half-strength liquid fertiliser monthly
